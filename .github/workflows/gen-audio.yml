name: Generate Audio + Deploy

on:
  workflow_dispatch:

jobs:
  gen-audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate MP3 files
        run: node scripts/gen-audio.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install deps & deploy
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Dobolino/Japan-App.git
          npm ci
          npm run deploy
